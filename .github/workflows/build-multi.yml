name: Build Multi-Version Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 1.0.0)'
        required: false
        type: string
      prerelease:
        description: '是否为预发布版本'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-win7:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.7
        uses: actions/setup-python@v5
        with:
          python-version: '3.7'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/invoice_renamer/requirements-win7.txt
          pip install pyinstaller

      - name: Build Windows 7 executable
        run: |
          pyinstaller --onefile --windowed --name="InvoiceRenamer_Win7" --hidden-import=invoice_renamer.gui --hidden-import=invoice_renamer.gui.main_window --hidden-import=invoice_renamer.gui.file_selector --hidden-import=invoice_renamer.gui.excel_viewer --hidden-import=invoice_renamer.gui.format_builder --hidden-import=invoice_renamer.gui.preview_table --hidden-import=invoice_renamer.core --hidden-import=invoice_renamer.core.excel_reader --hidden-import=invoice_renamer.core.file_matcher --hidden-import=invoice_renamer.core.renamer --hidden-import=invoice_renamer.core.utils src/invoice_renamer/main.py

      - name: Upload Windows 7 artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows7-executable
          path: dist/InvoiceRenamer_Win7.exe
          if-no-files-found: error

  build-win10:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/invoice_renamer/requirements.txt
          pip install pyinstaller

      - name: Build Windows 10/11 executable
        run: |
          pyinstaller --onefile --windowed --name="InvoiceRenamer_Win10" --hidden-import=invoice_renamer.gui --hidden-import=invoice_renamer.gui.main_window --hidden-import=invoice_renamer.gui.file_selector --hidden-import=invoice_renamer.gui.excel_viewer --hidden-import=invoice_renamer.gui.format_builder --hidden-import=invoice_renamer.gui.preview_table --hidden-import=invoice_renamer.core --hidden-import=invoice_renamer.core.excel_reader --hidden-import=invoice_renamer.core.file_matcher --hidden-import=invoice_renamer.core.renamer --hidden-import=invoice_renamer.core.utils src/invoice_renamer/main.py

      - name: Upload Windows 10/11 artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows10-executable
          path: dist/InvoiceRenamer_Win10.exe
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: [build-win7, build-win10]
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Windows 7 artifact
        uses: actions/download-artifact@v4
        with:
          name: windows7-executable
          path: dist/

      - name: Download Windows 10/11 artifact
        uses: actions/download-artifact@v4
        with:
          name: windows10-executable
          path: dist/

      - name: Generate version number
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            echo "tag_name=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "display_version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag_name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "display_version=${{ github.ref_name#v }}" >> $GITHUB_OUTPUT
          else
            timestamp=$(date +'%Y%m%d%H%M%S')
            echo "tag_name=v0.0.0-beta.${timestamp}" >> $GITHUB_OUTPUT
            echo "display_version=0.0.0-beta.${timestamp}" >> $GITHUB_OUTPUT
          fi

      - name: Rename executables with version
        run: |
          mv dist/InvoiceRenamer_Win7.exe "dist/InvoiceRenamer_Win7_v${{ steps.version.outputs.display_version }}.exe"
          mv dist/InvoiceRenamer_Win10.exe "dist/InvoiceRenamer_Win10_v${{ steps.version.outputs.display_version }}.exe"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/InvoiceRenamer_Win7_v${{ steps.version.outputs.display_version }}.exe
            dist/InvoiceRenamer_Win10_v${{ steps.version.outputs.display_version }}.exe
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: Release ${{ steps.version.outputs.tag_name }}
          body: |
            ## 多版本发布
            
            此版本包含两个可执行文件，分别兼容不同的Windows版本：
            
            ### 文件说明
            - `InvoiceRenamer_Win7_v${{ steps.version.outputs.display_version }}.exe`: 使用 Python 3.7 打包，兼容 Windows 7 SP1 及更高版本
            - `InvoiceRenamer_Win10_v${{ steps.version.outputs.display_version }}.exe`: 使用 Python 3.11 打包，推荐在 Windows 10/11 上使用
            
            ### 系统要求
            - **Windows 7 版本**: Windows 7 SP1 或更高版本，无需额外补丁
            - **Windows 10/11 版本**: Windows 10 或更高版本
            
            ### 使用说明
            1. 根据您的Windows版本选择合适的文件
            2. 下载并双击运行即可
            
            ### 功能说明
            两个版本功能完全一致，仅打包环境不同。
          draft: false
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}