name: Build Multi-Version Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-win7:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.7'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/invoice_renamer/requirements.txt
          pip install pyinstaller

      - name: Build Windows 7 executable
        run: |
          pyinstaller --onefile --windowed --name="发票批量重命名工具_Win7" src/invoice_renamer/main.py

      - name: Upload Windows 7 artifact
        uses: actions/upload-artifact@v3
        with:
          name: windows7-executable
          path: dist/发票批量重命名工具_Win7.exe

  build-win10:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/invoice_renamer/requirements.txt
          pip install pyinstaller

      - name: Build Windows 10/11 executable
        run: |
          pyinstaller --onefile --windowed --name="发票批量重命名工具_Win10" src/invoice_renamer/main.py

      - name: Upload Windows 10/11 artifact
        uses: actions/upload-artifact@v3
        with:
          name: windows10-executable
          path: dist/发票批量重命名工具_Win10.exe

  release:
    runs-on: ubuntu-latest
    needs: [build-win7, build-win10]
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download Windows 7 artifact
        uses: actions/download-artifact@v3
        with:
          name: windows7-executable
          path: dist/

      - name: Download Windows 10/11 artifact
        uses: actions/download-artifact@v3
        with:
          name: windows10-executable
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/发票批量重命名工具_Win7.exe
            dist/发票批量重命名工具_Win10.exe
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## 多版本发布
            
            此版本包含两个可执行文件，分别兼容不同的Windows版本：
            
            ### 文件说明
            - `发票批量重命名工具_Win7.exe`: 使用 Python 3.7 打包，兼容 Windows 7 SP1 及更高版本
            - `发票批量重命名工具_Win10.exe`: 使用 Python 3.11 打包，推荐在 Windows 10/11 上使用
            
            ### 系统要求
            - **Windows 7 版本**: Windows 7 SP1 或更高版本，无需额外补丁
            - **Windows 10/11 版本**: Windows 10 或更高版本
            
            ### 使用说明
            1. 根据您的Windows版本选择合适的文件
            2. 下载并双击运行即可
            
            ### 功能说明
            两个版本功能完全一致，仅打包环境不同。
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}